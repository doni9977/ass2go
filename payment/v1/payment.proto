syntax = "proto3";

package payment.v1;

option go_package = "github.com/doni9977/ass2go/payment/v1";

message PaymentRequest {
  string order_id = 1;
  int64 amount = 2;
}

message PaymentResponse {
  string id = 1;
  string order_id = 2;
  string transaction_id = 3;
  int64 amount = 4;
  string status = 5;
}

service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
}